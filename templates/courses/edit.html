{% extends 'base.html' %} {% block title %}Edit {{ course.name }} - Exodus{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'frontend:course_detail' course.id %}"
    class="mb-3 inline-flex items-center gap-1 text-sm font-medium text-brand-600 hover:text-brand-800 dark:text-brand-400 transition-colors"
  >
    <svg class="mr-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
    Back to Course
  </a>
  <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Edit Course</h1>
</div>

<div class="rounded-2xl border border-gray-100 bg-white/80 backdrop-blur-md shadow-xl shadow-brand-500/5 dark:border-gray-700/50 dark:bg-gray-800/80">
  <form method="post" class="space-y-6 p-6" hx-boost="true">
    {% csrf_token %}

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Course Name</label>
        <input
          type="text"
          name="name"
          id="name"
          value="{{ course.name }}"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        />
      </div>

      <div>
        <label for="course_code" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Course Code</label>
        <input
          type="text"
          name="course_code"
          id="course_code"
          value="{{ course.course_code }}"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        />
      </div>

      <div>
        <label for="lecturer" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Lecturer</label>
        <select
          name="lecturer"
          id="lecturer"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        >
          {% for lecturer in lecturers %}
          <option
            value="{{ lecturer.id }}"
            {% if course.lecturer.id == lecturer.id %}selected{% endif %}
          >
            {{ lecturer.name }}
          </option>
          {% endfor %}
        </select>
      </div>

      <div class="mt-6 flex items-center">
        <input
          type="checkbox"
          name="is_active"
          id="is_active"
          {% if course.is_active %}checked{% endif %}
          class="h-4 w-4 rounded border-gray-300 text-brand-600 focus:ring-brand-500"
        />
        <label for="is_active" class="ml-2 block text-sm text-gray-700 dark:text-gray-300">Active</label>
      </div>
    </div>

    <div class="border-t border-gray-200 dark:border-gray-700 pt-4">
      <label class="mb-2 block text-sm font-medium text-gray-700 dark:text-gray-300">Enrolled Students</label>
      <div
        class="grid max-h-60 grid-cols-2 gap-2 overflow-y-auto rounded-xl border border-gray-100 dark:border-gray-700 bg-white/30 p-4 md:grid-cols-3"
      >
        {% for student in students %}
        <label class="flex items-center space-x-2">
          <input
            type="checkbox"
            name="students"
            value="{{ student.id }}"
            {% if student.id in current_enrollments %}checked{% endif %}
            class="rounded border-gray-300 text-brand-600 focus:ring-brand-500"
          />
          <span class="text-sm text-gray-700 dark:text-gray-300">{{ student.name }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="flex justify-end gap-4 border-t border-gray-100 dark:border-gray-700 pt-6">
      <a
        href="{% url 'frontend:course_detail' course.id %}"
        class="rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 px-6 py-2.5 font-semibold text-gray-700 dark:text-gray-300 backdrop-blur-sm transition-all hover:bg-gray-50 active:scale-95"
        >Cancel</a
      >
      <button
        type="submit"
        class="rounded-xl bg-brand-600 px-6 py-2.5 font-semibold text-white shadow-lg shadow-brand-500/20 transition-all hover:-translate-y-0.5 hover:bg-brand-700 active:scale-95"
      >
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
