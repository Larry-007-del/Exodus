<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error - Exodus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="text-center px-6">
        <p class="text-red-600 text-6xl font-bold mb-4">500</p>
        <h1 class="text-3xl font-bold text-gray-900 mb-2">Something went wrong</h1>
        <p class="text-gray-500 mb-8 max-w-md mx-auto">We're experiencing a server error. Please try again later or contact support if the problem persists.</p>
        <div class="flex items-center justify-center gap-4">
            <a href="/" class="px-6 py-2.5 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 transition">
                Go Home
            </a>
            <a href="javascript:location.reload()" class="px-6 py-2.5 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-100 transition">
                Try Again
            </a>
        </div>
    </div>
</body>
</html>
