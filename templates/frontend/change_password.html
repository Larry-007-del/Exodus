{% extends 'base.html' %} {% block title %}Change Password - Exodus{% endblock %} {% block content %}
<div class="mx-auto max-w-lg">
  <div class="mb-6">
    <a href="{% url 'frontend:profile' %}" class="mb-3 inline-flex items-center gap-1 text-sm font-medium text-brand-600 hover:text-brand-800 dark:text-brand-400 transition-colors">
      <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      Back to Profile
    </a>
    <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white">Change Password</h1>
    <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Secure your account with a new password</p>
  </div>

  <div class="rounded-2xl border border-gray-100/60 bg-white/80 backdrop-blur-md p-6 shadow-lg shadow-gray-200/30 dark:border-gray-700/50 dark:bg-gray-800/80">
    <form method="post" action="{% url 'frontend:change_password' %}" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="current_password" class="mb-1.5 block text-sm font-semibold text-gray-700 dark:text-gray-300">Current Password</label>
        <input
          type="password"
          name="current_password"
          id="current_password"
          required
          placeholder="Enter current password"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700 px-4 py-2.5 text-sm text-gray-900 dark:text-white transition-all focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 dark:placeholder-gray-400"
        />
      </div>

      <div class="flex items-center gap-2">
        <div class="h-px flex-1 bg-gray-100 dark:bg-gray-700"></div>
        <span class="text-xs font-bold uppercase tracking-widest text-gray-400">New Password</span>
        <div class="h-px flex-1 bg-gray-100 dark:bg-gray-700"></div>
      </div>

      <div>
        <label for="new_password" class="mb-1.5 block text-sm font-semibold text-gray-700 dark:text-gray-300">New Password</label>
        <input
          type="password"
          name="new_password"
          id="new_password"
          required
          minlength="8"
          placeholder="At least 8 characters"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700 px-4 py-2.5 text-sm text-gray-900 dark:text-white transition-all focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 dark:placeholder-gray-400"
        />
        <p class="mt-1 text-xs text-gray-400">Minimum 8 characters</p>
      </div>

      <div>
        <label for="confirm_password" class="mb-1.5 block text-sm font-semibold text-gray-700 dark:text-gray-300">Confirm New Password</label>
        <input
          type="password"
          name="confirm_password"
          id="confirm_password"
          required
          minlength="8"
          placeholder="Re-enter new password"
          class="w-full rounded-xl border border-gray-200 dark:border-gray-600 bg-white/70 dark:bg-gray-700 px-4 py-2.5 text-sm text-gray-900 dark:text-white transition-all focus:border-brand-500 focus:ring-2 focus:ring-brand-500/30 dark:placeholder-gray-400"
        />
      </div>

      <div class="flex items-center justify-between border-t border-gray-100 dark:border-gray-700 pt-4">
        <a href="{% url 'frontend:profile' %}" class="rounded-xl border border-gray-200 dark:border-gray-600 px-5 py-2.5 text-sm font-semibold text-gray-600 dark:text-gray-300 transition-all hover:bg-gray-50 dark:hover:bg-gray-700 active:scale-95">
          Cancel
        </a>
        <button type="submit" class="rounded-xl bg-gradient-to-r from-brand-600 to-indigo-700 px-6 py-2.5 text-sm font-bold text-white shadow-lg shadow-brand-500/20 transition-all hover:-translate-y-0.5 hover:from-brand-700 hover:to-indigo-800 active:scale-95">
          Update Password
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
