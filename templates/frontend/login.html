<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Exodus</title>
    <meta name="description" content="Sign in to Exodus — university attendance tracking powered by QR codes, geolocation, and two-factor authentication." />
    <meta property="og:title" content="Login - Exodus" />
    <meta property="og:description" content="Sign in to Exodus — university attendance tracking powered by QR codes, geolocation, and two-factor authentication." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Exodus" />
    <meta name="theme-color" content="#4f46e5" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='20' font-weight='bold'>E</text></svg>"
    />
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <script defer src="{% static 'js/alpine.min.js' %}"></script>
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen bg-gradient-to-br from-brand-600 via-indigo-900 to-purple-900 dark:from-gray-900 dark:via-gray-900 dark:to-black selection:bg-brand-500 selection:text-white overflow-hidden relative">
    
    <!-- Animated background blooms -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0 pointer-events-none">
      <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-brand-500 blur-[120px] opacity-30 animate-pulse-slow"></div>
      <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-purple-500 blur-[120px] opacity-30 animate-pulse-slow" style="animation-delay: 1.5s;"></div>
    </div>

    <div class="mx-auto flex flex-col items-center justify-center px-6 py-8 w-full max-w-md z-10 animate-fade-in-up">
      <div
        class="w-full rounded-3xl border border-white/20 bg-white/10 backdrop-blur-xl shadow-2xl p-8 sm:p-10"
      >
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 text-white shadow-lg shadow-brand-500/50">
              <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">Exodus</h1>
            <p class="text-indigo-200">Sign in to your account</p>
        </div>

        <form class="space-y-6" action="{% url 'frontend:login' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}" />

            <div>
              <label for="username" class="mb-2 block text-sm font-medium text-white">Your Username</label>
              <input
                type="text"
                name="username"
                id="username"
                autocomplete="username"
                class="block w-full rounded-xl border border-white/20 bg-white/10 p-3 text-white placeholder-indigo-200/70 focus:border-white focus:bg-white/20 focus:ring-0 transition-all sm:text-sm"
                placeholder="Student ID or Username"
                required=""
              />
            </div>

            <div x-data="{ show: false }">
              <label for="password" class="mb-2 block text-sm font-medium text-white">Password</label>
              <div class="relative">
                <input
                  :type="show ? 'text' : 'password'"
                  name="password"
                  id="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                  class="block w-full rounded-xl border border-white/20 bg-white/10 p-3 pr-16 text-white placeholder-indigo-200/70 focus:border-white focus:bg-white/20 focus:ring-0 transition-all sm:text-sm"
                  required=""
                />
                <button
                  type="button"
                  @click="show = !show"
                  class="absolute inset-y-0 right-0 flex items-center pr-4 text-sm text-indigo-200 hover:text-white transition-colors"
                >
                  <span x-text="show ? 'Hide' : 'Show'"></span>
                </button>
              </div>
            </div>

            {% if messages %} 
              {% for message in messages %}
              <div class="rounded-xl bg-red-500/20 border border-red-500/50 p-4 text-sm text-red-100 backdrop-blur-md" role="alert">
                {{ message }}
              </div>
              {% endfor %} 
            {% endif %} 
            
            {% if form.errors %}
              <div class="rounded-xl bg-red-500/20 border border-red-500/50 p-4 text-sm text-red-100 backdrop-blur-md">
                Username or password incorrect.
              </div>
            {% endif %}

            <div class="flex items-center justify-end">
              <a href="{% url 'frontend:password_reset' %}" class="text-sm font-medium text-brand-200 hover:text-white transition-colors">Forgot password?</a>
            </div>

            <button
              type="submit"
              class="w-full rounded-xl bg-gradient-to-r from-brand-500 to-purple-600 px-5 py-3.5 text-center text-sm font-bold text-white shadow-lg shadow-brand-500/30 hover:shadow-brand-500/50 hover:-translate-y-0.5 transition-all focus:outline-none focus:ring-4 focus:ring-brand-500/50"
            >
              Sign in
            </button>

            <!-- Registration Link -->
            <div class="text-center mt-6">
              <p class="text-sm text-indigo-200">
                Don't have an account?
                <a href="{% url 'frontend:register' %}" class="font-bold text-white hover:text-brand-200 transition-colors">
                  Create an account
                </a>
              </p>
            </div>
          </form>
      </div>
    </div>
  </body>
</html>
