<!doctype html>
{% load static %}
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Login - Exodus</title>
    <meta name="description" content="Sign in to Exodus — university attendance tracking powered by QR codes, geolocation, and two-factor authentication." />
    <meta property="og:title" content="Login - Exodus" />
    <meta property="og:description" content="Sign in to Exodus — university attendance tracking powered by QR codes, geolocation, and two-factor authentication." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Exodus" />
    <meta name="theme-color" content="#4f46e5" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%234f46e5'/><text x='50%25' y='55%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='20' font-weight='bold'>E</text></svg>"
    />
    <!-- Google Fonts: Outfit - ASYNC LOAD FOR MOBILE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap&preload" rel="stylesheet" as="style" media="(min-width: 1025px)">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600&display=swap" rel="stylesheet"></noscript>
    
    <style>
      body { font-family: system-ui, -apple-system, 'Segoe UI', sans-serif; }
      @media (min-width: 1025px) { body { font-family: 'Outfit', system-ui, -apple-system, sans-serif; } }
      
      /* Eliminate infamous 300ms tap delay universally */
      button, a, input, select, textarea {
        touch-action: manipulation;
      }
    </style>
    
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link rel="stylesheet" href="{% static 'css/mobile-optimization.css' %}" />
  </head>
  <body class="bg-gray-50 flex items-center justify-center min-h-screen dark:from-gray-900 dark:via-gray-900 dark:to-black selection:bg-brand-500 selection:text-white overflow-hidden relative" style="background: #1f2937;">
    
    <!-- NO ANIMATED BLOOMS ON MOBILE - Too expensive! -->
    <!-- Visual blooms removed entirely for low-end devices -->

    <div class="mx-auto flex flex-col items-center justify-center px-6 py-8 w-full max-w-md z-10" style="animation: none; opacity: 1; transform: none;">
      <div
        class="w-full rounded-3xl bg-slate-900 shadow-xl p-8 sm:p-10"
        style="border: none; background-color: #111827; backdrop-filter: none; -webkit-backdrop-filter: none;"
      >
        <div class="text-center mb-8">
            <div class="mx-auto mb-4 inline-flex items-center justify-center h-16 w-16 rounded-2xl bg-gradient-to-br from-brand-400 to-brand-600 text-white shadow-lg shadow-brand-500/50">
              <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">Exodus</h1>
            <p class="text-indigo-200">Sign in to your account</p>
        </div>

        <form class="space-y-6" action="{% url 'frontend:login' %}" method="POST">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ request.GET.next }}" />

            <div>
              <label for="username" class="mb-2 block text-sm font-medium text-white">Your Username</label>
              <input
                type="text"
                name="username"
                id="username"
                autocomplete="username"
                inputmode="text"
                class="block w-full rounded-lg border border-gray-600 bg-gray-800 p-3 text-white placeholder-gray-400 focus:border-indigo-500 focus:bg-gray-700 focus:ring-0 sm:text-sm"
                style="font-size: 16px; border: 1px solid #4b5563; background: #1f2937; transition: none; min-height: 48px;"
                placeholder="Student ID or Username"
                required=""
              />
            </div>

            <div>
              <label for="password" class="mb-2 block text-sm font-medium text-white">Password</label>
              <div class="relative">
                <input
                  type="password"
                  name="password"
                  id="password"
                  autocomplete="current-password"
                  placeholder="••••••••"
                  class="block w-full rounded-lg border border-gray-600 bg-gray-800 p-3 pr-16 text-white placeholder-gray-400 focus:border-indigo-500 focus:bg-gray-700 focus:ring-0 sm:text-sm"
                  style="font-size: 16px; border: 1px solid #4b5563; background: #1f2937; transition: none; min-height: 48px;"
                  required=""
                />
                <button
                  type="button"
                  onclick="const input = document.getElementById('password'); const isPassword = input.type === 'password'; input.type = isPassword ? 'text' : 'password'; this.querySelector('span').innerText = isPassword ? 'Hide' : 'Show';"
                  class="absolute inset-y-0 right-0 flex items-center pr-4 text-sm text-gray-300 hover:text-white"
                  style="transition: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation;"
                >
                  <span>Show</span>
                </button>
              </div>
            </div>

            {% if messages %} 
              {% for message in messages %}
              <div class="rounded-lg bg-red-900 border border-red-700 p-4 text-sm text-red-100" role="alert" style="background-color: #7f1d1d; backdrop-filter: none;">
                {{ message }}
              </div>
              {% endfor %} 
            {% endif %} 
            
            {% if form.errors %}
              <div class="rounded-lg bg-red-900 border border-red-700 p-4 text-sm text-red-100" style="background-color: #7f1d1d; backdrop-filter: none;">
                Username or password incorrect.
              </div>
            {% endif %}

            <div class="flex items-center justify-end">
              <a href="{% url 'frontend:password_reset' %}" class="text-sm font-medium text-indigo-300 hover:text-indigo-200" style="transition: none;">Forgot password?</a>
            </div>

            <button
              type="submit"
              class="w-full rounded-lg bg-indigo-600 px-5 py-3.5 text-center text-sm font-bold text-white shadow-lg focus:outline-none"
              style="background-color: #4f46e5; transition: none; min-height: 48px; font-size: 16px; -webkit-tap-highlight-color: transparent;"
            >
              Sign in
            </button>

            <!-- Registration Link -->
            <div class="text-center mt-6">
              <p class="text-sm text-indigo-200">
                Don't have an account?
                <a href="{% url 'frontend:register' %}" class="font-bold text-white hover:text-indigo-200" style="transition: none;">
                  Create an account
                </a>
              </p>
            </div>
          </form>
      </div>
    </div>
  </body>
</html>
