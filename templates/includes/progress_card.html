{% if task_id %}
<div id="progress-card" class="mb-6 overflow-hidden rounded-2xl border border-brand-100/60 bg-white/80 backdrop-blur-md shadow-lg shadow-brand-500/10 dark:border-brand-900/40 dark:bg-gray-800/80">
  <div class="h-1 w-full bg-gradient-to-r from-brand-500 to-purple-600"></div>
  <div class="p-5">
    <div class="mb-3 flex items-center gap-3">
      <div id="progress-spinner" class="h-4 w-4 animate-spin rounded-full border-2 border-brand-200 border-t-brand-600"></div>
      <p class="text-sm font-bold text-gray-900 dark:text-white" id="progress-title">Processing Upload…</p>
    </div>
    <p class="mb-3 text-xs text-gray-500 dark:text-gray-400" id="progress-status">Starting…</p>
    <div class="mb-2 h-2 w-full overflow-hidden rounded-full bg-gray-200 dark:bg-gray-700">
      <div id="progress-bar" class="h-full rounded-full bg-gradient-to-r from-brand-500 to-indigo-600 transition-all duration-500" style="width:0%"></div>
    </div>
    <p class="text-xs text-gray-400" id="progress-count"></p>
    <div id="progress-result" class="mt-3 hidden"></div>
  </div>
</div>

<script>
(function() {
  const taskId = '{{ task_id }}';
  const statusUrl = '{% url "frontend:task_status" task_id %}';
  const bar = document.getElementById('progress-bar');
  const statusEl = document.getElementById('progress-status');
  const countEl = document.getElementById('progress-count');
  const titleEl = document.getElementById('progress-title');
  const spinner = document.getElementById('progress-spinner');
  const resultEl = document.getElementById('progress-result');
  let pollInterval;

  function poll() {
    fetch(statusUrl).then(r => r.json()).then(data => {
      if (data.state === 'PROGRESS') {
        const pct = Math.round((data.current / data.total) * 100);
        bar.style.width = pct + '%';
        statusEl.textContent = data.status || 'Processing…';
        countEl.textContent = data.current + ' / ' + data.total;
      } else if (data.state === 'SUCCESS') {
        clearInterval(pollInterval);
        bar.style.width = '100%';
        bar.className = 'h-full rounded-full bg-emerald-500 transition-all duration-500';
        spinner.style.display = 'none';
        titleEl.textContent = 'Upload Complete';
        statusEl.textContent = 'All records have been processed.';
        countEl.textContent = '';
        const r = data.result || {};
        let html = '<div class="rounded-xl border border-emerald-200 dark:border-emerald-800/40 bg-emerald-50 dark:bg-emerald-900/20 px-4 py-3 text-sm text-emerald-800 dark:text-emerald-200">';
        if (r.created !== undefined) html += '<strong>' + r.created + '</strong> created';
        if (r.enrolled !== undefined) html += '<strong>' + r.enrolled + '</strong> enrolled';
        if (r.skipped !== undefined) html += ', <strong>' + r.skipped + '</strong> skipped';
        if (r.total !== undefined) html += ' (of ' + r.total + ' total)';
        if (r.course) html += ' in <strong>' + r.course + '</strong>';
        html += '</div>';
        resultEl.innerHTML = html;
        resultEl.classList.remove('hidden');
      } else if (data.state === 'FAILURE') {
        clearInterval(pollInterval);
        bar.style.width = '100%';
        bar.className = 'h-full rounded-full bg-red-500 transition-all duration-500';
        spinner.style.display = 'none';
        titleEl.textContent = 'Upload Failed';
        statusEl.textContent = data.error || 'An error occurred during processing.';
        countEl.textContent = '';
      }
    }).catch(() => { statusEl.textContent = 'Checking status…'; });
  }

  poll();
  pollInterval = setInterval(poll, 1500);
})();
</script>
{% endif %}
