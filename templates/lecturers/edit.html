{% extends 'base.html' %} {% block title %}Edit {{ lecturer.name }} - Exodus{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'frontend:lecturer_detail' lecturer.id %}"
    class="mb-4 flex items-center text-indigo-600 hover:text-indigo-800"
  >
    <svg class="mr-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
    Back to Lecturer
  </a>
  <h1 class="text-2xl font-bold text-gray-900">Edit Lecturer</h1>
</div>

<div class="rounded-2xl border border-gray-100 bg-white/80 backdrop-blur-md shadow-xl shadow-brand-500/5 dark:border-gray-700/50 dark:bg-gray-800/80">
  <form method="post" class="space-y-6 p-6" hx-boost="true" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <div class="md:col-span-2">
        <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
        <input
          type="text"
          name="name"
          id="name"
          value="{{ lecturer.name }}"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        />
      </div>

      <!-- Profile Picture -->
      <div class="md:col-span-2">
        <label for="profile_picture" class="block text-sm font-medium text-gray-700">Profile Picture</label>
        {% if lecturer.profile_picture %}
          <div class="mt-2 mb-3">
            <img src="{{ lecturer.profile_picture.url }}" alt="Profile Picture" class="h-16 w-16 rounded-full object-cover border border-gray-200 shadow-sm">
          </div>
        {% endif %}
        <input
          type="file"
          name="profile_picture"
          id="profile_picture"
          accept="image/*"
          class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:rounded-md file:border-0 file:bg-indigo-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-indigo-700 hover:file:bg-indigo-100 focus:outline-none"
        />
      </div>

      <div>
        <label for="department" class="block text-sm font-medium text-gray-700">Department</label>
        <input
          type="text"
          name="department"
          id="department"
          value="{{ lecturer.department|default:'' }}"
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        />
      </div>

      <div>
        <label for="phone_number" class="block text-sm font-medium text-gray-700"
          >Phone Number</label
        >
        <input
          type="text"
          name="phone_number"
          id="phone_number"
          value="{{ lecturer.phone_number|default:'' }}"
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        />
      </div>

      <div>
        <label for="latitude" class="block text-sm font-medium text-gray-700">Latitude</label>
        <input
          type="number"
          step="any"
          name="latitude"
          id="latitude"
          value="{{ lecturer.latitude|default:'' }}"
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        />
      </div>

      <div>
        <label for="longitude" class="block text-sm font-medium text-gray-700">Longitude</label>
        <input
          type="number"
          step="any"
          name="longitude"
          id="longitude"
          value="{{ lecturer.longitude|default:'' }}"
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500"
        />
      </div>
    </div>

    <div class="flex justify-end gap-4 border-t border-gray-100 pt-6">
      <a
        href="{% url 'frontend:lecturer_detail' lecturer.id %}"
        class="rounded-xl border border-gray-200 bg-white/50 px-6 py-2.5 font-semibold text-gray-700 backdrop-blur-sm transition-all hover:bg-gray-50 active:scale-95"
      >
        Cancel
      </a>
      <button
        type="submit"
        class="rounded-xl bg-brand-600 px-6 py-2.5 font-semibold text-white shadow-lg shadow-brand-500/20 transition-all hover:-translate-y-0.5 hover:bg-brand-700 active:scale-95"
      >
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
