{% extends 'base.html' %} {% block title %}Lecturers - Exodus{% endblock %} {% block content %}
<div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Lecturers</h1>
    <p class="mt-1 text-gray-600">Manage lecturer records</p>
  </div>
  <a
    href="{% url 'frontend:lecturer_create' %}"
    class="mt-4 inline-flex items-center rounded-xl bg-brand-600 px-5 py-2.5 font-semibold text-white shadow-lg shadow-brand-500/20 transition-all hover:-translate-y-0.5 hover:bg-brand-700 active:scale-95 md:mt-0"
  >
    <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 4v16m8-8H4"
      ></path>
    </svg>
    Add Lecturer
  </a>
</div>

<!-- Search -->
<div class="mb-6 rounded-2xl border border-gray-100 bg-white/80 p-6 backdrop-blur-md shadow-lg shadow-brand-500/5 dark:border-gray-700/50 dark:bg-gray-800/80">
  <form method="get" class="flex flex-col gap-4 md:flex-row">
    <div class="flex-1">
      <input type="hidden" name="sort" value="{{ sort }}">
      <input
        type="text"
        name="q"
        value="{{ query }}"
        placeholder="Search by name, staff ID, or department..."
        hx-get="{% url 'frontend:lecturer_list' %}"
        hx-trigger="keyup changed delay:500ms"
        hx-target="#lecturer-list-container"
        hx-push-url="true"
        class="w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>
    <button type="submit" class="rounded-xl bg-gray-900 px-6 py-2.5 font-semibold text-white shadow-lg shadow-gray-900/10 transition-all hover:-translate-y-0.5 hover:bg-black active:scale-95">
      Search
    </button>
    {% if query %}
    <a
      href="{% url 'frontend:lecturer_list' %}"
      class="rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 px-6 py-2.5 font-semibold backdrop-blur-sm transition-all hover:bg-gray-50 active:scale-95"
    >
      Clear
    </a>
    {% endif %}
  </form>
</div>

<!-- Lecturers Table Container for HTMX -->
<div id="lecturer-list-container">
  {% include 'partials/lecturer_list_content.html' %}
</div>

{% endblock %}
