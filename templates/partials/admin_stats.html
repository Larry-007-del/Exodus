<div class="mb-6 grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-4">
  <!-- Total Students — indigo -->
  <div class="relative overflow-hidden rounded-2xl border border-indigo-100/60 bg-white/80 backdrop-blur-md p-6 shadow-lg shadow-indigo-200/30 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl dark:border-indigo-900/40 dark:bg-gray-800/80 dark:shadow-none">
    <div class="absolute inset-x-0 top-0 h-1 rounded-t-2xl bg-gradient-to-r from-indigo-400 to-indigo-600"></div>
    <div class="mb-3 flex items-center justify-between">
      <p class="text-xs font-semibold uppercase tracking-widest text-indigo-400 dark:text-indigo-300">Total Students</p>
      <div class="rounded-xl bg-indigo-50 p-2.5 dark:bg-indigo-900/40">
        <svg class="h-5 w-5 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
      </div>
    </div>
    <h5 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white">{{ total_students }}</h5>
    <p class="mt-1 text-xs text-gray-400 dark:text-gray-500">Registered accounts</p>
  </div>

  <!-- Total Lecturers — violet -->
  <div class="relative overflow-hidden rounded-2xl border border-violet-100/60 bg-white/80 backdrop-blur-md p-6 shadow-lg shadow-violet-200/30 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl dark:border-violet-900/40 dark:bg-gray-800/80 dark:shadow-none">
    <div class="absolute inset-x-0 top-0 h-1 rounded-t-2xl bg-gradient-to-r from-violet-400 to-violet-600"></div>
    <div class="mb-3 flex items-center justify-between">
      <p class="text-xs font-semibold uppercase tracking-widest text-violet-400 dark:text-violet-300">Total Lecturers</p>
      <div class="rounded-xl bg-violet-50 p-2.5 dark:bg-violet-900/40">
        <svg class="h-5 w-5 text-violet-600 dark:text-violet-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
      </div>
    </div>
    <h5 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white">{{ total_lecturers }}</h5>
    <p class="mt-1 text-xs text-gray-400 dark:text-gray-500">Active faculty</p>
  </div>

  <!-- Total Courses — emerald -->
  <div class="relative overflow-hidden rounded-2xl border border-emerald-100/60 bg-white/80 backdrop-blur-md p-6 shadow-lg shadow-emerald-200/30 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl dark:border-emerald-900/40 dark:bg-gray-800/80 dark:shadow-none">
    <div class="absolute inset-x-0 top-0 h-1 rounded-t-2xl bg-gradient-to-r from-emerald-400 to-emerald-600"></div>
    <div class="mb-3 flex items-center justify-between">
      <p class="text-xs font-semibold uppercase tracking-widest text-emerald-500 dark:text-emerald-300">Total Courses</p>
      <div class="rounded-xl bg-emerald-50 p-2.5 dark:bg-emerald-900/40">
        <svg class="h-5 w-5 text-emerald-600 dark:text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
    </div>
    <h5 class="text-3xl font-extrabold tracking-tight text-gray-900 dark:text-white">{{ total_courses }}</h5>
    <p class="mt-1 text-xs text-gray-400 dark:text-gray-500">Across all departments</p>
  </div>

  <!-- Live Sessions — blue with ping -->
  <div class="relative overflow-hidden rounded-2xl border border-blue-200/50 bg-gradient-to-br from-blue-50/90 to-indigo-50/80 backdrop-blur-md p-6 shadow-lg shadow-blue-200/40 transition-all duration-300 hover:-translate-y-1 hover:shadow-xl dark:border-blue-800/50 dark:bg-blue-900/30 dark:from-blue-900/30 dark:to-indigo-900/20 dark:shadow-none">
    <div class="absolute inset-x-0 top-0 h-1 rounded-t-2xl bg-gradient-to-r from-blue-400 to-indigo-500"></div>
    <div class="mb-3 flex items-center justify-between">
      <p class="text-xs font-semibold uppercase tracking-widest text-blue-500 dark:text-blue-300">Live Sessions</p>
      <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-blue-100 dark:bg-blue-800/40">
        <span class="relative flex h-3 w-3">
          <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-blue-400 opacity-75"></span>
          <span class="relative inline-flex h-3 w-3 rounded-full bg-blue-500"></span>
        </span>
      </div>
    </div>
    <h5 class="text-3xl font-extrabold tracking-tight text-blue-900 dark:text-white">{{ today_attendance }}</h5>
    <p class="mt-1 text-xs text-blue-400 dark:text-blue-400">Sessions active now</p>
  </div>
</div>
