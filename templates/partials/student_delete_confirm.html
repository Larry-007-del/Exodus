<div class="rounded-xl border border-red-200 dark:border-red-900/40 bg-red-50/80 dark:bg-red-900/20 p-4 backdrop-blur-sm">
  <div class="flex items-start gap-3">
    <svg class="mt-0.5 h-5 w-5 flex-shrink-0 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
    </svg>
    <p class="text-sm text-red-800 dark:text-red-300">
      Are you sure you want to delete <strong>{{ student.name }}</strong> ({{ student.student_id }})? This action cannot be undone.
    </p>
  </div>
  <div class="mt-4 flex justify-end gap-2">
    <button hx-post="{% url 'frontend:student_delete' student.id %}" class="rounded-xl bg-red-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition-all hover:bg-red-700 active:scale-95">Confirm Delete</button>
    <button onclick="this.closest('.rounded-xl').remove()" class="rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 dark:bg-gray-700/50 px-4 py-2 text-sm font-semibold text-gray-700 dark:text-gray-300 transition-all hover:bg-gray-50 dark:hover:bg-gray-700 active:scale-95">Cancel</button>
  </div>
</div>
