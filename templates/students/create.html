{% extends 'base.html' %} {% block title %}Add Student - Exodus{% endblock %} {% block content %}
<div class="mb-6">
  <a
    href="{% url 'frontend:student_list' %}"
    class="mb-4 flex items-center text-indigo-600 hover:text-indigo-800"
  >
    <svg class="mr-1 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M15 19l-7-7 7-7"
      ></path>
    </svg>
    Back to Students
  </a>
  <h1 class="text-2xl font-bold text-gray-900 dark:text-white">Add New Student</h1>
</div>

<div class="rounded-2xl border border-gray-200 bg-white/80 backdrop-blur-md shadow-xl shadow-brand-500/5 dark:border-gray-700/50 dark:bg-gray-800/80">
  <form method="post" class="space-y-6 p-6" hx-boost="true" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="grid grid-cols-1 gap-6 md:grid-cols-2">
      <div>
        <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Username *</label>
        <input
          type="text"
          name="username"
          id="username"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>

      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Email *</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Password *</label>
        <input
          type="password"
          name="password"
          id="password"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>

      <div>
        <label for="student_id" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Student ID *</label>
        <input
          type="text"
          name="student_id"
          id="student_id"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>

      <div class="md:col-span-2">
        <label for="name" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Full Name *</label>
        <input
          type="text"
          name="name"
          id="name"
          required
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>

      <!-- Profile Picture -->
      <div class="md:col-span-2">
        <label for="profile_picture" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Profile Picture</label>
        <input
          type="file"
          name="profile_picture"
          id="profile_picture"
          accept="image/*"
          class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:rounded-md file:border-0 file:bg-green-50 file:px-4 file:py-2 file:text-sm file:font-semibold file:text-green-700 hover:file:bg-green-100 focus:outline-none"
        />
      </div>

      <div>
        <label for="programme_of_study" class="block text-sm font-medium text-gray-700 dark:text-gray-300"
          >Programme of Study</label
        >
        <input
          type="text"
          name="programme_of_study"
          id="programme_of_study"
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>

      <div>
        <label for="year" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Year</label>
        <input
          type="text"
          name="year"
          id="year"
          placeholder="e.g., 1, 2, 3"
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>

      <div>
        <label for="phone_number" class="block text-sm font-medium text-gray-700 dark:text-gray-300"
          >Phone Number</label
        >
        <input
          type="text"
          name="phone_number"
          id="phone_number"
          class="mt-1 block w-full rounded-xl border border-gray-200 bg-white/50 px-4 py-2.5 backdrop-blur-sm transition-all focus:border-brand-500 focus:ring-brand-500 dark:border-gray-700 dark:bg-gray-900/50"
        />
      </div>
    </div>

    <div class="flex justify-end gap-4 border-t border-gray-100 dark:border-gray-700 pt-6">
      <a
        href="{% url 'frontend:student_list' %}"
        class="rounded-xl border border-gray-200 dark:border-gray-700 bg-white/50 px-6 py-2.5 text-sm font-semibold text-gray-700 dark:text-gray-300 backdrop-blur-sm transition-all hover:bg-gray-50 active:scale-95"
      >
        Cancel
      </a>
      <button
        type="submit"
        class="rounded-xl bg-brand-600 px-8 py-2.5 font-semibold text-white shadow-lg shadow-brand-500/20 transition-all hover:-translate-y-0.5 hover:bg-brand-700 active:scale-95"
      >
        Create Student
      </button>
    </div>
  </form>
</div>
{% endblock %}
