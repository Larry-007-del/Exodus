{% extends 'base.html' %} {% block title %}Students - Exodus{% endblock %} {% block content %}
<div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Students</h1>
    <p class="mt-1 text-gray-600">Manage student records</p>
  </div>
  <a
    href="{% url 'frontend:student_create' %}"
    class="mt-4 inline-flex items-center rounded-lg bg-green-600 px-4 py-2 text-white hover:bg-green-700 md:mt-0"
  >
    <svg class="mr-2 h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="2"
        d="M12 4v16m8-8H4"
      ></path>
    </svg>
    Add Student
  </a>
</div>

<!-- Search & Filters -->
<div class="mb-6 rounded-lg bg-white p-4 shadow dark:bg-gray-800">
  <form method="get" class="flex flex-col gap-4 md:flex-row" id="studentSearchForm">
    <input type="hidden" name="sort" value="{{ sort|default:'name' }}">
    <div class="flex-1">
      <input
        type="text"
        name="q"
        value="{{ query }}"
        placeholder="Search by name or student ID..."
        hx-get="{% url 'frontend:student_list' %}"
        hx-trigger="keyup changed delay:500ms, search"
        hx-target="#student-list-container"
        hx-include="#studentSearchForm"
        hx-push-url="true"
        class="w-full rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
      />
    </div>
    <select
      name="year"
      hx-get="{% url 'frontend:student_list' %}"
      hx-trigger="change"
      hx-target="#student-list-container"
      hx-include="#studentSearchForm"
      hx-push-url="true"
      class="rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
    >
      <option value="">All Years</option>
      {% for year in years %}
      <option value="{{ year }}" {% if year_filter == year %}selected{% endif %}>
        {{ year }}
      </option>
      {% endfor %}
    </select>
    <select
      name="programme"
      hx-get="{% url 'frontend:student_list' %}"
      hx-trigger="change"
      hx-target="#student-list-container"
      hx-include="#studentSearchForm"
      hx-push-url="true"
      class="rounded-lg border border-gray-300 px-4 py-2 focus:border-green-500 focus:ring-green-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
    >
      <option value="">All Programmes</option>
      {% for prog in programmes %}
      <option value="{{ prog }}" {% if programme_filter == prog %}selected{% endif %}>
        {{ prog }}
      </option>
      {% endfor %}
    </select>
    <button type="submit" class="rounded-lg bg-gray-800 px-6 py-2 text-white hover:bg-gray-900">
      Filter
    </button>
    {% if query or year_filter or programme_filter %}
    <a
      href="{% url 'frontend:student_list' %}"
      class="rounded-lg border border-gray-300 px-6 py-2 hover:bg-gray-50"
    >
      Clear
    </a>
    {% endif %}
  </form>
</div>

<!-- Students Table Container -->
<div id="student-list-container">
  {% include 'partials/student_list_content.html' %}
</div>

{% endblock %}
